<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
}

#carrossel {
    position: absolute;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 300px;    
}

.item {
    display: none;
    width: 100%;
}

.item.ativo {
    display: block;
}

.item img {
    width: 100%;
    display: block;
}

@keyframes shake {
    0%   { transform: translateX(-50%) translateY(0); }
    25%  { transform: translateX(-50%) translateY(-4px); }
    50%  { transform: translateX(-50%) translateY(4px); }
    75%  { transform: translateX(-50%) translateY(-4px); }
    100% { transform: translateX(-50%) translateY(0); }
}
</style>

</head>
<body>

<div id="carrossel">

    <!-- QR Code -->
    <div id="item1" class="item ativo">
        <img src="qrcode.png" alt="QR Code">
    </div>

    <!-- Botão clicável -->
    <a id="item2"
       class="item"
       href="https://www.streamar.com.br/cavaquinhoeviolao/assinar"
       target="_blank">
        <img src="botao.png" alt="Planos">
    </a>

</div>

<script>

const itens = [
    document.getElementById("item1"),
    document.getElementById("item2")
];

const tempos = [
    30000, // QR Code: 30 segundos
    5000   // Botão: 5 segundos
];

let indice = 0;

function mostrarItem() {

    itens.forEach(item => item.classList.remove("ativo"));

    itens[indice].classList.add("ativo");

    const tempo = tempos[indice];

    indice = (indice + 1) % itens.length;

    setTimeout(mostrarItem, tempo);
}

mostrarItem();

</script>

</body>
</html>
