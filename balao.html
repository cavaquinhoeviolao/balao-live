<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
}

#mensagem,
#qrcode {
    display: none;
}

#mensagem.ativo,
#qrcode.ativo {
    display: block;
}

#mensagem {
    width: 300px;
    height: 300px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    font-family: Arial Black, Arial, sans-serif;
    font-size: 42px;
    font-weight: bold;
    color: white;
    text-align: center;
    line-height: 1.2;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0px  0px 8px rgba(0,0,0,.6);
}

#qrcode img {
    display: block;
    width: 300px;
    height: auto;
}
</style>

</head>
<body>

<div id="mensagem" class="ativo">
    <div>APOIE O CANAL!</div>
    <div>🤠👍</div>
</div>

<div id="qrcode">
    <img src="qrcode.png" alt="QR Code">
</div>

<script>
const elementos = [
    document.getElementById("mensagem"),
    document.getElementById("qrcode")
];

const tempos = [
    5000,   // Mensagem: 5 segundos
    50000   // QR Code: 50 segundos
];

let indice = 0;

function mostrarElemento() {
    elementos.forEach(el => el.classList.remove("ativo"));

    elementos[indice].classList.add("ativo");

    const tempo = tempos[indice];

    indice = (indice + 1) % elementos.length;

    setTimeout(mostrarElemento, tempo);
}

mostrarElemento();
</script>

</body>
</html>
