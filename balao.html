<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    width: 300px;
    height: 300px;
}

#container {
    position: relative;
    width: 300px;
    height: 300px;
}

#mensagem,
#qrcode {
    position: absolute;
    inset: 0;
    display: none;
}

#mensagem.ativo,
#qrcode.ativo {
    display: flex;
}

#mensagem {
    justify-content: center;
    align-items: center;
    flex-direction: column;

    font-family: Arial Black, Arial, sans-serif;
    font-size: 42px;
    font-weight: bold;
    color: white;
    text-align: center;
    line-height: 1.15;

    text-shadow:
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0 0 8px rgba(0,0,0,.6);
}

#qrcode {
    justify-content: center;
    align-items: center;
}

#qrcode img {
    width: 300px;
    height: 300px;
    display: block;
}
</style>

</head>
<body>

<div id="container">

    <div id="mensagem" class="ativo">
        <div>APOIE O CANAL!</div>
        <div style="font-size:60px;">🤠👍</div>
    </div>

    <div id="qrcode">
        <img src="qrcode.png" alt="QR Code">
    </div>

</div>

<script>
const elementos = [
    document.getElementById("mensagem"),
    document.getElementById("qrcode")
];

const tempos = [
    5000,
    50000
];

let indice = 0;

function mostrarElemento() {
    elementos.forEach(el => el.classList.remove("ativo"));

    elementos[indice].classList.add("ativo");

    setTimeout(mostrarElemento, tempos[indice]);

    indice = (indice + 1) % elementos.length;
}

mostrarElemento();
</script>

</body>
</html>
